<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <script defer src="script.js"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">        <title>Project: Calculator</title>
    </head>
    <body>
        <h1>Project: Calculator</h1>
        <div class="calculator">
            <div class="screen-container">
                <div class="screen" id="line1"></div>
                <div class="screen" id="line2"></div>
            </div>
            <div class="button-row">
                <button class="number">1</button>
                <button class="number">2</button>
                <button class="number">3</button>
                <button class="operator">÷</button>
            </div>
            <div class="button-row">
                <button class="number">4</button>
                <button class="number">5</button>
                <button class="number">6</button>
                <button class="operator">×</button>
            </div>
            <div class="button-row">
                <button class="number">7</button>
                <button class="number">8</button>
                <button class="number">9</button>
                <button class="operator">-</button>
            </div>
            <div class="button-row">
                <button id="period">.</button>
                <button class="number">0</button>
                <button id="backspace"><</button>
                <button class="operator">+</button>
            </div>
            <div class="button-row">
                <button id="clear-screen">CA</button>
                <button id="equals" style="width: 158px;">=</button>
            </div>
        </div>
    </body>
</html>
